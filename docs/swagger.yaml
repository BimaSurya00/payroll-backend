# ============================================================
# COMPONENTS
# ============================================================
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "JWT access token (15 min expiry). Use /auth/refresh to get a new one."

  parameters:
    UUID:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Page:
      name: page
      in: query
      schema:
        type: integer
        default: 1
        minimum: 1
    PerPage:
      name: per_page
      in: query
      schema:
        type: integer
        default: 10
        minimum: 1
        maximum: 100

  responses:
    SuccessNoData:
      description: Success response with no data
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SuccessResponse'
          example:
            success: true
            statusCode: 200
            message: "Success"
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Unauthorized:
      description: Unauthorized - invalid or expired token
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Forbidden:
      description: Forbidden - insufficient role
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Conflict:
      description: Conflict - resource already exists
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ValidationErrorResponse' }

  schemas:
    # --- Common Responses ---
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        statusCode:
          type: integer
          example: 200
        message:
          type: string
        data: {}

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        statusCode:
          type: integer
        message:
          type: string
        error:
          type: string

    ValidationErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        statusCode:
          type: integer
          example: 422
        message:
          type: string
          example: "Validation failed"
        error:
          type: array
          items:
            $ref: '#/components/schemas/ValidationErrorItem'

    ValidationErrorItem:
      type: object
      properties:
        field:
          type: string
          example: "email"
        message:
          type: string
          example: "Invalid email format"

    Pagination:
      type: object
      properties:
        currentPage:
          type: integer
          example: 1
        perPage:
          type: integer
          example: 10
        total:
          type: integer
          format: int64
          example: 100
        lastPage:
          type: integer
          example: 10
        firstPageUrl:
          type: string
          nullable: true
        lastPageUrl:
          type: string
          nullable: true
        nextPageUrl:
          type: string
          nullable: true
        prevPageUrl:
          type: string
          nullable: true

    # --- Auth Schemas ---
    RegisterRequest:
      type: object
      required: [name, email, password, companyId]
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 100
          example: "John Doe"
        email:
          type: string
          format: email
          example: "john@example.com"
        password:
          type: string
          minLength: 8
          description: "Must contain uppercase, lowercase, number, and special character"
          example: "Password123!"
        companyId:
          type: string
          format: uuid

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    RefreshTokenRequest:
      type: object
      required: [refreshToken, userId]
      properties:
        refreshToken:
          type: string
        userId:
          type: string
          format: uuid

    ChangePasswordRequest:
      type: object
      required: [oldPassword, newPassword]
      properties:
        oldPassword:
          type: string
        newPassword:
          type: string
          minLength: 8
          description: "Must contain uppercase, lowercase, number, and special character"

    AuthResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/UserResponse'
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresAt:
          type: integer
          format: int64
        tokenType:
          type: string
          example: "Bearer"

    RefreshResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresAt:
          type: integer
          format: int64

    # --- User Schemas ---
    UserResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        companyId:
          type: string
          format: uuid
        companyName:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [SUPER_USER, ADMIN, USER]
        isActive:
          type: boolean
        profileImageUrl:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateUserRequest:
      type: object
      required: [name, email, password, role]
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 100
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        role:
          type: string
          enum: [SUPER_USER, ADMIN, USER]
        companyId:
          type: string
          format: uuid

    UpdateUserRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 100
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        role:
          type: string
          enum: [SUPER_USER, ADMIN, USER]
        isActive:
          type: boolean
        companyId:
          type: string
          format: uuid

    # --- Employee Schemas ---
    EmployeeResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        userName:
          type: string
        userEmail:
          type: string
        position:
          type: string
        phoneNumber:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        salaryBase:
          type: number
          format: double
        joinDate:
          type: string
          format: date
        bankName:
          type: string
          nullable: true
        bankAccountNumber:
          type: string
          nullable: true
        bankAccountHolder:
          type: string
          nullable: true
        scheduleId:
          type: string
          format: uuid
          nullable: true
        schedule:
          $ref: '#/components/schemas/ScheduleDetail'
        employmentStatus:
