          nullable: true
        division:
          type: string
          nullable: true
        departmentId:
          type: string
          format: uuid
          nullable: true
        departmentName:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ScheduleDetail:
