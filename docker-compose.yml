services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hris-api
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - APP_ENV=production
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DATABASE=${POSTGRES_DATABASE}
      - KEYDB_HOST=keydb
      - KEYDB_PORT=6379
      - KEYDB_PASSWORD=${KEYDB_PASSWORD}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=${MINIO_BUCKET}
      - MINIO_USE_SSL=${MINIO_USE_SSL}
    volumes:
      - ./.env:/app/.env:ro
    depends_on:
      postgres:
        condition: service_healthy
      keydb:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - hris-network
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    container_name: hris-postgres
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DATABASE}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - hris-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio:
    image: minio/minio:latest
    container_name: hris-minio
    command: server /data --console-address ":9001"
    ports:
      - "9010:9000"
      - "9011:9001"
    env_file:
      - .env
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY}
    volumes:
      - minio-data:/data
    networks:
      - hris-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  migrate:
    image: golang:1.24-bookworm
    profiles:
      - migrate
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DATABASE}?sslmode=disable
    volumes:
      - ./database/migrations:/migrations
    networks:
      - hris-network
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["go", "run", "/migrations/migrate.go"]

  keydb:
    image: eqalpha/keydb:latest
    container_name: hris-keydb
    command: >
      sh -c "if [ -n '${KEYDB_PASSWORD}' ]; then
        keydb-server --appendonly yes --requirepass '${KEYDB_PASSWORD}';
      else
        keydb-server --appendonly yes --protected-mode no;
      fi"
    volumes:
      - keydb-data:/data
    networks:
      - hris-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "if [ -n '${KEYDB_PASSWORD}' ]; then keydb-cli -a '${KEYDB_PASSWORD}' ping; else keydb-cli ping; fi"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres-data:
    driver: local
  keydb-data:
    driver: local
  minio-data:
    driver: local

networks:
  hris-network:
    driver: bridge
